server.port=8080
# Postgres
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/youtube}
spring.datasource.username=${DATABASE_USER:jameskirk}
spring.datasource.password=${DATABASE_PASSWORD:password}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
# JWT
jwt.secret=${JWT_SECRET:change-me-to-a-long-random-secret-in-production}
jwt.expiration-ms=86400000
# Kafka
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=youtube-group
spring.kafka.consumer.auto-offset-reset=earliest
# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379
# AWS S3
aws.s3.bucket=${AWS_S3_BUCKET:youtube-videos-bucket}
aws.s3.region=${AWS_REGION:us-east-1}
aws.access-key=${AWS_ACCESS_KEY:}
aws.secret-key=${AWS_SECRET_KEY:}
aws.s3.upload-url-expiration-minutes=15
aws.s3.playback-url-expiration-minutes=60
# Elasticsearch
spring.elasticsearch.uris=${ELASTICSEARCH_URI:http://localhost:9200}